# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Stage site
        run: |
          mkdir -p _site/app _site/track-maps
          cp -R public/app/. _site/app/
          if [ -d public/track-maps ]; then cp -R public/track-maps/. _site/track-maps/ ; fi
          # Root redirect to the app
          cat > _site/index.html <<'HTML'
          <!doctype html><meta charset="utf-8">
          <title>F1 Telemetry Analyzer</title>
          <meta http-equiv="refresh" content="0; url=./app/">
          <link rel="canonical" href="./app/">
          <p>Redirecting to <a href="./app/">the app</a>…</p>
          HTML
          touch _site/.nojekyll
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
